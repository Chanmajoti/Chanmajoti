<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chanmajoti AB</title>

<style>
body {margin:0;font-family:Arial;background:#f4f4f4;}
header {background:white;padding:15px;text-align:center;}
header img {max-width:200px;}

nav {background:#7a007a;padding:12px;text-align:center;}
nav a {color:white;margin:0 12px;text-decoration:none;font-weight:bold;cursor:pointer;}

.section {display:none;padding:30px;max-width:1100px;margin:auto;}
.active {display:block;}

.hero {
background:linear-gradient(135deg,#7a007a,#d100d1);
color:white;
padding:70px;
text-align:center;
}

.services {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card {
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

footer {
background:#222;
color:white;
text-align:center;
padding:20px;
margin-top:30px;
}

input, textarea {
width:100%;
padding:10px;
margin:10px 0;
}

button {
background:#7a007a;
color:white;
padding:12px;
border:none;
width:100%;
}
</style>

<script>
function showSection(id) {
    document.getElementById("home").classList.remove("active");
    document.getElementById("services").classList.remove("active");
    document.getElementById("contact").classList.remove("active");

    document.getElementById(id).classList.add("active");
}
</script>

</head>

<body>

<header>
<img src="logo.png">
</header>

<nav>
<a onclick="showSection('home')">Hem</a>
<a onclick="showSection('services')">Tjänster</a>
<a onclick="showSection('contact')">Kontakt</a>
</nav>

<!-- HEM -->
<div id="home" class="section active">
<div class="hero">
<h1>Ekonomiska lösningar för ditt företag</h1>
<p>Vi hjälper dig att växa tryggt och effektivt</p>
</div>
</div>

<!-- TJÄNSTER -->
<div id="services" class="section">
<h2>Våra tjänster</h2>

<div class="services">
<div class="card">Bokföring</div>
<div class="card">Ekonomisk rådgivning</div>
<div class="card">Konsultverksamhet</div>
<div class="card">Arbetskraftsuthyrning</div>
<div class="card">Fastighetsservice</div>
<div class="card">Uthyrning</div>
</div>
</div>

<!-- KONTAKT -->
<div id="contact" class="section">
<h2>Kontakta oss</h2>

<p>📧 <a href="mailto:info@chanmajoti.se">info@chanmajoti.se</a></p>
<p>📞 <a href="tel:0729205788">0729205788</a></p>

<form action="mailto:info@chanmajoti.se" method="post">
<input type="text" placeholder="Ditt namn">
<input type="email" placeholder="Din email">
<textarea placeholder="Meddelande"></textarea>
<button>Skicka</button>
</form>
</div>

<footer>
<p>© 2026 Chanmajoti AB</p>
</footer>

</body>
</html>
