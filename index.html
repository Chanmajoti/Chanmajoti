<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chanmajoti AB</title>
<style>
body {margin:0;font-family:Arial;background:#f5f5f5;}
header {background:white;padding:20px;text-align:center;}
header img {max-width:220px;}
nav {background:#7a007a;padding:12px;text-align:center;}
nav a {color:white;margin:0 15px;text-decoration:none;font-weight:bold;}
.hero {background:linear-gradient(135deg,#7a007a,#b300b3);color:white;padding:60px;text-align:center;}
.container {padding:40px;max-width:1000px;margin:auto;}
.services {display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
.card {background:white;padding:20px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
footer {background:#333;color:white;text-align:center;padding:20px;}
</style>
</head>
<body>
<header>
<img src="logo.png" alt="Chanmajoti AB">
</header>
<nav>
<a href="#">Hem</a>
<a href="#">Tjänster</a>
<a href="#">Kontakt</a>
</nav>
<section class="hero">
<h1>Ekonomiska lösningar för ditt företag</h1>
<p>Vi hjälper dig att växa tryggt</p>
</section>
<section class="container">
<h2>Våra tjänster</h2>
<div class="services">
<div class="card"><h3>Bokföring</h3></div>
<div class="card"><h3>Ekonomisk rådgivning</h3></div>
<div class="card"><h3>Konsultverksamhet</h3></div>
<div class="card"><h3>Arbetskraftsuthyrning</h3></div>
<div class="card"><h3>Fastighetsservice</h3></div>
<div class="card"><h3>Uthyrning</h3></div>
</div>
</section>
<footer>
<p>© 2026 Chanmajoti AB</p>
</footer>
</body>
</html>
